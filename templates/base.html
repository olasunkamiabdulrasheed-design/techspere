<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}TechSphere{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white">
    <nav class="border-b border-white/10 px-6 py-4 flex justify-between items-center">
        {% if user.is_authenticated %}
    <a href="{% url 'notifications' %}" class="relative hover:text-blue-400">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
    </a>

    {% endif %}
        <form method="get" action="{% url 'search' %}" class="flex-1 max-w-sm mx-6">
    <input type="text" name="q" placeholder="Search posts, projects, people..."
        value="{{ request.GET.q }}"
        class="w-full px-4 py-1.5 rounded-lg bg-white/5 border border-white/10 text-sm text-white focus:outline-none focus:border-blue-500">
    </form>
        <a href="/" class="text-xl font-bold text-blue-400">TechSphere</a>
        <div class="flex gap-6 items-center text-sm">
            <a href="{% url 'category_list' %}" class="hover:text-blue-400">Channels</a>
            <a href="{% url 'project_list' %}" class="hover:text-blue-400">Teams</a>
            {% if user.is_authenticated %}
                <a href="{% url 'profile' user.username %}" class="hover:text-blue-400">{{ user.username }}</a>
                <form method="post" action="{% url 'logout' %}" class="inline">
                {% csrf_token %}
            <button type="submit" class="hover:text-blue-400">Log out</button>
        </form>
            {% else %}
                <a href="{% url 'login' %}" class="hover:text-blue-400">Log in</a>
                <a href="{% url 'signup' %}" class="bg-blue-600 px-4 py-1.5 rounded-lg">Sign up</a>
            {% endif %}
        </div>
    </nav>

    {% if messages %}
<div class="max-w-3xl mx-auto px-6 pt-4">
    {% for message in messages %}
    <div class="p-3 rounded-lg text-sm mb-2
        {% if message.tags == 'success' %}bg-green-500/10 text-green-400 border border-green-500/20
        {% elif message.tags == 'error' %}bg-red-500/10 text-red-400 border border-red-500/20
        {% else %}bg-blue-500/10 text-blue-400 border border-blue-500/20{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
</div>
{% endif %}
    {% block content %}{% endblock %}
</body>
</html>
