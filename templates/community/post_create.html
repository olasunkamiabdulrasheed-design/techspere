{% extends 'base.html' %}
{% block content %}

<div class="max-w-2xl mx-auto px-6 py-12">
    <a href="{% url 'post_list' category.slug %}" class="text-sm text-gray-500 hover:text-blue-400 transition">&larr; Back to #{{ category.slug }}</a>

    <div class="mt-6 p-8 bg-white/5 rounded-2xl border border-white/10">
        <p class="text-cyan-400 font-mono text-xs mb-2">#{{ category.slug }}</p>
        <h1 class="text-2xl font-bold mb-1">New Post</h1>
        <p class="text-gray-400 text-sm mb-6">Share something with the {{ category.name }} community.</p>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-gray-300 mb-1.5">Title</label>
                <input type="text" name="title" required placeholder="What's this about?"
                    class="w-full p-3 rounded-lg bg-white/5 border border-white/10 text-white text-sm focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm text-gray-300 mb-1.5">Content</label>
                <textarea name="content" required rows="6" placeholder="Write your post..."
                    class="w-full p-3 rounded-lg bg-white/5 border border-white/10 text-white text-sm focus:outline-none focus:border-blue-500"></textarea>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition">
                Post
            </button>
        </form>
    </div>
</div>

{% endblock %}
