{% extends 'base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto mt-12">
    <h1 class="text-2xl font-bold mb-4">New Post in {{ category.name }}</h1>
    <form method="post">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Title" class="w-full p-2 mb-3 rounded bg-white/5 border border-white/10">
        <textarea name="content" placeholder="Content" class="w-full p-2 rounded bg-white/5 border border-white/10" rows="6"></textarea>
        <button type="submit" class="mt-3 bg-blue-600 px-4 py-2 rounded-lg">Post</button>
    </form>
</div>
{% endblock %}
