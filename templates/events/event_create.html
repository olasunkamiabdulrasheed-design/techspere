{% extends 'base.html' %}
{% block title %}Create Event - TechSphere{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-6 py-8">
  <a href="{% url 'event_list' %}" class="text-xs text-gray-500 dark:text-gray-400 hover:text-accent dark:hover:text-accent-dark mb-5 inline-block">&larr; Back to Events</a>

  <div class="bg-white dark:bg-[#1b1f23] border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm p-7">
    <h1 class="text-xl font-bold text-gray-900 dark:text-white">Create an Event</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 mb-6">Host a hackathon, workshop, webinar or meetup for the community.</p>

    <form method="post" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Event Title *</label>
        <input type="text" name="title" placeholder="e.g. TechSphere Monthly Hackathon" required
          class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Event Type *</label>
          <select name="event_type" required
            class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all cursor-pointer">
            <option value="hackathon">Hackathon</option>
            <option value="workshop">Workshop</option>
            <option value="webinar">Webinar</option>
            <option value="meetup">Meetup</option>
            <option value="competition">Competition</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Date & Time *</label>
          <input type="datetime-local" name="event_date" required
            class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Location</label>
        <input type="text" name="location" placeholder="e.g. Lagos, Nigeria or Online (Zoom)"
          class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Description *</label>
        <textarea name="description" rows="5" placeholder="What's this event about? What will participants learn, build, or win?" required
          class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all resize-y"></textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Prize (optional)</label>
          <input type="text" name="prize" placeholder="e.g. $500 cash prize"
            class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Max Participants</label>
          <input type="number" name="max_participants" placeholder="Leave blank = unlimited" min="1"
            class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
        </div>
      </div>

      <div class="pt-2 flex gap-3">
        <button type="submit"
          class="inline-flex items-center justify-center px-6 py-2.5 bg-accent hover:bg-accent-hover dark:bg-accent-dark dark:hover:bg-accent-dark-hover text-white text-sm font-semibold rounded-lg transition-colors">
          Create Event
        </button>
        <a href="{% url 'event_list' %}"
          class="inline-flex items-center justify-center px-6 py-2.5 border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 text-sm font-semibold rounded-lg hover:bg-gray-50 dark:hover:bg-[#0d1117] transition-colors">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
