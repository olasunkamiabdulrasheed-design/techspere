{% extends 'base.html' %}
{% block title %}Post a Job — TechSphere{% endblock %}
{% block content %}

<div style="max-width: 600px; margin: 0 auto;">
  <a href="{% url 'job_list' %}" style="font-size: 12px; color: var(--text-3); text-decoration: none; display: inline-block; margin-bottom: 16px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-3)'">← Back to Job Board</a>

  <div class="card" style="padding: 24px;">
    <h1 style="font-size: 1.15rem; font-weight: 700; color: var(--text); margin-bottom: 4px;">Post a Job</h1>
    <p style="font-size: 13px; color: var(--text-3); margin-bottom: 20px;">Reach thousands of developers, designers, and tech professionals.</p>

    <form method="post">
      {% csrf_token %}

      <div class="form-group">
        <label class="form-label">Job Title</label>
        <input type="text" name="title" class="form-input" placeholder="e.g. Senior Django Developer" required>
      </div>

      <div class="form-group">
        <label class="form-label">Company Name</label>
        <input type="text" name="company" class="form-input" placeholder="e.g. Acme Inc." required>
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
        <div class="form-group">
          <label class="form-label">Location</label>
          <input type="text" name="location" class="form-input" placeholder="e.g. Lagos, Nigeria / Remote">
        </div>
        <div class="form-group">
          <label class="form-label">Job Type</label>
          <select name="job_type" class="form-select">
            <option value="fulltime">Full Time</option>
            <option value="parttime">Part Time</option>
            <option value="internship">Internship</option>
            <option value="freelance">Freelance</option>
            <option value="remote">Remote</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Job Description</label>
        <textarea name="description" class="form-textarea" rows="5" placeholder="Describe the role, responsibilities, and what you're building..." required style="resize: vertical;"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Requirements</label>
        <textarea name="requirements" class="form-textarea" rows="4" placeholder="List skills, experience, or qualifications needed..." style="resize: vertical;"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">External Apply Link (optional)</label>
        <input type="url" name="apply_link" class="form-input" placeholder="https://yoursite.com/apply">
        <p style="font-size: 12px; color: var(--text-3); margin-top: 4px;">Leave blank to receive applications directly on TechSphere.</p>
      </div>

      <button type="submit" class="btn btn-primary">Post Job</button>
    </form>
  </div>
</div>
{% endblock %}
