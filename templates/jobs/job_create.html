{% extends 'base.html' %}
{% block title %}Post a Job - TechSphere{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-6 py-8">
  <a href="{% url 'job_list' %}" class="text-xs text-gray-500 dark:text-gray-400 hover:text-accent dark:hover:text-accent-dark mb-5 inline-block">&larr; Back to Job Board</a>

  <div class="bg-white dark:bg-[#1b1f23] border border-gray-200 dark:border-gray-700 rounded-2xl shadow-sm p-7">
    <h1 class="text-xl font-bold text-gray-900 dark:text-white">Post a Job</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1 mb-6">Reach thousands of developers, designers, and builders in the community.</p>

    <form method="post" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Job Title *</label>
        <input type="text" name="title" placeholder="e.g. Senior Backend Engineer" required
          class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Company *</label>
          <input type="text" name="company" placeholder="e.g. TechSphere Inc." required
            class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
        </div>
        <div>
          <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Job Type *</label>
          <select name="job_type" required
            class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all cursor-pointer">
            <option value="fulltime">Full-time</option>
            <option value="parttime">Part-time</option>
            <option value="internship">Internship</option>
            <option value="freelance">Freelance</option>
            <option value="remote">Remote</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Location</label>
        <input type="text" name="location" placeholder="e.g. Lagos, Nigeria or Remote"
          class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Description *</label>
        <textarea name="description" rows="5" placeholder="What will this person be doing day to day?" required
          class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all resize-y"></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Requirements</label>
        <textarea name="requirements" rows="4" placeholder="Skills, experience, or qualifications needed"
          class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all resize-y"></textarea>
      </div>

      <div>
        <label class="block text-xs font-semibold uppercase tracking-wide text-gray-500 dark:text-gray-400 mb-1.5">Application Link</label>
        <input type="url" name="apply_link" placeholder="https://yourcompany.com/careers/apply"
          class="w-full px-3.5 py-2.5 bg-gray-50 dark:bg-[#0d1117] border border-gray-200 dark:border-gray-700 rounded-lg text-sm text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent/20 dark:focus:ring-accent-dark/20 focus:border-accent dark:focus:border-accent-dark transition-all">
      </div>

      <div class="pt-2 flex gap-3">
        <button type="submit"
          class="inline-flex items-center justify-center px-6 py-2.5 bg-accent hover:bg-accent-hover dark:bg-accent-dark dark:hover:bg-accent-dark-hover text-white text-sm font-semibold rounded-lg transition-colors">
          Post Job
        </button>
        <a href="{% url 'job_list' %}"
          class="inline-flex items-center justify-center px-6 py-2.5 border border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300 text-sm font-semibold rounded-lg hover:bg-gray-50 dark:hover:bg-[#0d1117] transition-colors">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
