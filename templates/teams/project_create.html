{% extends 'base.html' %}
{% block content %}

<div class="max-w-2xl mx-auto px-6 py-12">
    <a href="{% url 'project_list' %}" class="text-sm text-gray-500 hover:text-blue-400 transition">&larr; Back to Teams</a>

    <div class="mt-6 p-8 bg-white/5 rounded-2xl border border-white/10">
        <p class="text-cyan-400 font-mono text-xs mb-2">#new-project</p>
        <h1 class="text-2xl font-bold mb-1">Post a Project</h1>
        <p class="text-gray-400 text-sm mb-6">Tell the community what you're building and who you need.</p>

        <form method="post" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-gray-300 mb-1.5">Project title</label>
                <input type="text" name="title" required placeholder="e.g. AI-powered recipe app"
                    class="w-full p-3 rounded-lg bg-white/5 border border-white/10 text-white text-sm focus:outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="block text-sm text-gray-300 mb-1.5">Description</label>
                <textarea name="description" required rows="5" placeholder="What are you building? What's the goal?"
                    class="w-full p-3 rounded-lg bg-white/5 border border-white/10 text-white text-sm focus:outline-none focus:border-blue-500"></textarea>
            </div>

            <div>
                <label class="block text-sm text-gray-300 mb-1.5">Roles needed</label>
                <input type="text" name="roles_needed" placeholder="e.g. Frontend Developer, UI Designer"
                    class="w-full p-3 rounded-lg bg-white/5 border border-white/10 text-white text-sm focus:outline-none focus:border-blue-500">
                <p class="text-xs text-gray-500 mt-1.5">Separate roles with commas.</p>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition">
                Post Project
            </button>
        </form>
    </div>
</div>
{% endblock %}
