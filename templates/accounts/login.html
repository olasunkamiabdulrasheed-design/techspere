{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6">
    <div class="w-full max-w-md p-8 bg-white/5 rounded-2xl border border-white/10">
        <h1 class="text-2xl font-bold mb-1 text-white">Welcome back</h1>
        <p class="text-gray-400 text-sm mb-6">Log in to continue to TechSphere.</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-gray-300 mb-1">Username</label>
                <input type="text" name="username" required>
            </div>

            <div>
                <label class="block text-sm text-gray-300 mb-1">Password</label>
                <div class="relative">
                    <input type="password" name="password" id="password-field" required class="pr-12">
                    <button type="button" id="toggle-password"
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-400">
                        <!-- Eye open icon (shown by default) -->
                        <svg id="eye-open" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        <!-- Eye slashed icon (hidden by default) -->
                        <svg id="eye-closed" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.5 18.5 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition">
                Log In
            </button>
        </form>

        <p class="text-sm text-gray-400 mt-6 text-center">
            Don't have an account?
            <a href="{% url 'signup' %}" class="text-blue-400 hover:underline">Sign up</a>
        </p>
    </div>
</div>

<style>
    input {
        width: 100%;
        padding: 0.6rem 0.8rem;
        border-radius: 0.5rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: white;
    }
    input:focus {
        outline: none;
        border-color: #3b82f6;
    }
</style>

<script>
    document.getElementById('toggle-password').addEventListener('click', function() {
        const field = document.getElementById('password-field');
        const eyeOpen = document.getElementById('eye-open');
        const eyeClosed = document.getElementById('eye-closed');
        const isPassword = field.type === 'password';

        field.type = isPassword ? 'text' : 'password';
        eyeOpen.classList.toggle('hidden', isPassword);
        eyeClosed.classList.toggle('hidden', !isPassword);
    });
</script>
{% endblock %}
