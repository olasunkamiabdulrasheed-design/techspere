{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6">
    <div class="w-full max-w-md p-8 bg-white/5 rounded-2xl border border-white/10">
        <h1 class="text-2xl font-bold mb-1 text-white">Reset your password</h1>
        <p class="text-gray-400 text-sm mb-6">Enter your email and we'll send you a link to reset it.</p>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-300 mb-1">Email</label>
                <input type="email" name="email" required>
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition">
                Send Reset Link
            </button>
        </form>

        <p class="text-sm text-gray-400 mt-6 text-center">
            <a href="{% url 'login' %}" class="text-blue-400 hover:underline">Back to login</a>
        </p>
    </div>
</div>
<style>
    input {
        width: 100%;
        padding: 0.6rem 0.8rem;
        border-radius: 0.5rem;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: white;
    }
    input:focus { outline: none; border-color: #3b82f6; }
</style>
{% endblock %}
