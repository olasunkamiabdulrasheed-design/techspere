{% extends 'base.html' %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-6">
    <div class="w-full max-w-md p-8 bg-white/5 rounded-2xl border border-white/10 text-center">
        <h1 class="text-2xl font-bold mb-2 text-white">Check your email</h1>
        <p class="text-gray-400 text-sm mb-6">
            If an account exists with that email, we've sent a link to reset your password.
        </p>
        <a href="{% url 'login' %}" class="text-blue-400 hover:underline text-sm">Back to login</a>
    </div>
</div>
{% endblock %}
